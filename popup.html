<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebP Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="header">
  <h1>WebP Pro</h1>
  <div class="toggle-container">
    <label class="toggle-switch">
      <input type="checkbox" id="zipToggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
</div>

<div class="input-grid">
  <div class="input-group">
    <div class="range-wrap">
      <input type="range" id="qualitySlider" min="1" max="100" value="25"/>
      <span id="qVal">25%</span>
    </div>
  </div>
  <div class="input-group" style="flex: 0 0 100px;">
    <input type="number" id="maxSize" value="50" min="10" max="9999"/>
  </div>
</div>

<div class="drop" id="drop">
  <input type="file" id="fileIn" accept="image/*" multiple/>
  <div class="drop-title">Drop Images Here</div>
  <div class="drop-sub">JPG, PNG, GIF, WEBP supported</div>
</div>

<div class="file-list" id="fileList">
  <div class="empty">No images selected yet</div>
</div>

<div class="summary" id="summary">
  <div class="si"><div class="si-v" id="sCount">0</div><div class="si-k">Files</div></div>
  <div class="si"><div class="si-v" id="sOrig">0 KB</div><div class="si-k">Original</div></div>
  <div class="si"><div class="si-v" id="sSaved">0%</div><div class="si-k">Saved</div></div>
  <div class="si"><div class="si-v" id="sFinal">0 KB</div><div class="si-k">Final</div></div>
</div>

<div class="btn-row">
  <button class="btn btn-primary"   id="convertBtn" disabled>Convert & Download</button>
</div>

<script src="jszip.min.js"></script>
<script src="popup.js"></script>
</body>
</html>
