<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebP Compressor Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 500px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 20px 14px;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    .header p  { font-size: 10px; color: #8888aa; margin-top: 1px; }

    /* ── Drop Zone ── */
    .drop-zone {
      margin: 16px;
      border: 2px dashed #2e2e4a;
      border-radius: 12px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all .25s;
      background: #13131e;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #6c63ff;
      background: #16162a;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 32px; margin-bottom: 8px; }
    .drop-title { font-size: 13px; font-weight: 600; color: #c8c8e8; }
    .drop-sub   { font-size: 10px; color: #6666888; margin-top: 4px; }
    .drop-sub span { color: #6c63ff; }

    /* ── Settings Card ── */
    .settings {
      margin: 0 16px 12px;
      background: #13131e;
      border-radius: 12px;
      border: 1px solid #1e1e32;
      overflow: hidden;
    }
    .settings-row {
      padding: 12px 14px;
      border-bottom: 1px solid #1a1a2a;
    }
    .settings-row:last-child { border-bottom: none; }

    .row-label {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .row-label span { font-size: 11px; color: #9999bb; font-weight: 500; }
    .row-label strong { font-size: 12px; color: #e0e0ff; }

    /* slider */
    input[type="range"] {
      width: 100%; height: 4px;
      -webkit-appearance: none;
      background: #2a2a3e;
      border-radius: 4px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(108,99,255,.5);
    }

    /* toggle */
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #1a1a2a;
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 11px; color: #9999bb; }
    .toggle {
      width: 36px; height: 20px;
      background: #2a2a3e;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle.on { background: linear-gradient(135deg, #6c63ff, #3ecfcf); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: left .2s;
    }
    .toggle.on::after { left: 19px; }

    /* max size input */
    .size-input-wrap {
      display: flex; align-items: center; gap: 6px; margin-top: 6px;
    }
    .size-input-wrap input[type="number"] {
      flex: 1;
      background: #0f0f18;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      padding: 5px 8px;
      color: #e0e0ff;
      font-size: 12px;
      outline: none;
    }
    .size-input-wrap input[type="number"]:focus { border-color: #6c63ff; }
    .size-input-wrap span { font-size: 11px; color: #6666888; }

    /* ── File List ── */
    .file-list {
      margin: 0 16px 12px;
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-track { background: #0f0f13; }
    .file-list::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }

    .file-item {
      background: #13131e;
      border: 1px solid #1e1e32;
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .file-thumb {
      width: 32px; height: 32px;
      object-fit: cover;
      border-radius: 4px;
      background: #1e1e2e;
      flex-shrink: 0;
    }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 10px; color: #c8c8e8; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-size { font-size: 9px; color: #6666888; margin-top: 2px; }
    .file-status {
      font-size: 9px; margin-top: 2px;
      display: flex; align-items: center; gap: 3px;
    }
    .file-remove {
      background: none; border: none; color: #444466;
      cursor: pointer; font-size: 14px; line-height: 1;
      flex-shrink: 0;
      transition: color .15s;
    }
    .file-remove:hover { color: #ff6b6b; }

    /* progress bar inside file item */
    .progress-bar {
      height: 3px; border-radius: 2px;
      background: #2a2a3e;
      margin-top: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6c63ff, #3ecfcf);
      border-radius: 2px;
      transition: width .3s;
    }

    /* ── Buttons ── */
    .btn-row {
      margin: 0 16px 16px;
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      color: #fff;
    }
    .btn-secondary {
      background: #1e1e32;
      color: #9999bb;
      border: 1px solid #2a2a3e;
    }

    /* ── Summary bar ── */
    .summary {
      margin: 0 16px 8px;
      background: #0d1f1f;
      border: 1px solid #1a3333;
      border-radius: 8px;
      padding: 8px 12px;
      display: none;
      gap: 16px;
    }
    .summary.visible { display: flex; }
    .sum-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .sum-val { font-size: 13px; font-weight: 700; color: #3ecfcf; }
    .sum-key { font-size: 9px; color: #6666888; margin-top: 1px; }

    /* ── Empty state ── */
    .empty-hint {
      text-align: center;
      padding: 10px;
      font-size: 10px;
      color: #3a3a55;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">🖼</div>
  <div>
    <h1>WebP Compressor Pro</h1>
    <p>Compress → Convert → Download</p>
  </div>
</div>

<!-- Drop Zone -->
<div class="drop-zone" id="dropZone">
  <input type="file" id="fileInput" accept="image/*" multiple />
  <div class="drop-icon">📂</div>
  <div class="drop-title">Click or Drop Images Here</div>
  <div class="drop-sub">JPG, PNG, WEBP, GIF — <span>multiple files supported</span></div>
</div>

<!-- Settings -->
<div class="settings">

  <!-- Quality Slider -->
  <div class="settings-row">
    <div class="row-label">
      <span>Quality</span>
      <strong id="qualityVal">75%</strong>
    </div>
    <input type="range" id="qualitySlider" min="10" max="100" value="75" />
  </div>

  <!-- Max File Size -->
  <div class="settings-row">
    <div class="toggle-row" style="padding:0; border:none;">
      <span class="toggle-label">Max File Size Target</span>
      <div class="toggle" id="sizeToggle"></div>
    </div>
    <div class="size-input-wrap" id="sizeInputWrap" style="display:none; margin-top:8px;">
      <input type="number" id="maxSizeInput" value="200" min="10" max="5000" />
      <span>KB (per image)</span>
    </div>
  </div>

  <!-- Batch ZIP -->
  <div class="settings-row">
    <div class="toggle-row" style="padding:0; border:none;">
      <span class="toggle-label">Download as ZIP (batch)</span>
      <div class="toggle on" id="zipToggle"></div>
    </div>
  </div>

</div>

<!-- File List -->
<div class="file-list" id="fileList">
  <div class="empty-hint" id="emptyHint">No images selected yet</div>
</div>

<!-- Summary -->
<div class="summary" id="summary">
  <div class="sum-item"><div class="sum-val" id="sumCount">0</div><div class="sum-key">Files</div></div>
  <div class="sum-item"><div class="sum-val" id="sumOriginal">0 KB</div><div class="sum-key">Original</div></div>
  <div class="sum-item"><div class="sum-val" id="sumSaved">0%</div><div class="sum-key">Saved</div></div>
  <div class="sum-item"><div class="sum-val" id="sumFinal">0 KB</div><div class="sum-key">Final</div></div>
</div>

<!-- Action Buttons -->
<div class="btn-row">
  <button class="btn btn-secondary" id="clearBtn">🗑 Clear</button>
  <button class="btn btn-primary" id="convertBtn" disabled>⚡ Convert & Download</button>
</div>

<script src="popup.js"></script>
</body>
</html>
